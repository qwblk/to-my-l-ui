<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- Browser tab favicon. Points to the same generated icon as the
         Android manifest, so all "icon" surfaces share one source of truth. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="To My L — 把暗恋这件事，认真地保存下来。" />
    <meta name="theme-color" content="#FF7EB6" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS-specific home-screen icon. iOS ignores manifest icons. -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="To My L" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>To My L</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Register the service worker only in production. During `vite dev`
      // SW caching makes hot reload behave erratically; safer off.
      if ('serviceWorker' in navigator && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {})
        })
      }
    </script>
  </body>
</html>
