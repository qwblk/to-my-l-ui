worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout  65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    # Clients (browsers) will only ever talk to this nginx, on the same
    # origin as the SPA. Backend container is reached internally by
    # Docker DNS at "backend:8081". The BACKEND_ORIGIN env var lets the
    # compose file substitute this at startup if needed.
    upstream backend {
        # Backend compose/container service name.
        # Current backend container is `to-my-l-app`.
        server to-my-l-app:8081;
    }

    # Map upgrade header for WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # All plain HTTP traffic gets bounced to HTTPS. Certificates are
        # mounted into this container, so TLS terminates here rather than in
        # an outer panel/proxy.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;
        client_max_body_size 60m;  # generous: video uploads are 50MB max

        # Mount Tencent Cloud's Nginx certificate files as:
        #   ./certs/fullchain.pem -> /etc/nginx/certs/fullchain.pem
        #   ./certs/privkey.pem   -> /etc/nginx/certs/privkey.pem
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        root   /usr/share/nginx/html;
        index  index.html;

        # SPA fallback (every non-asset path serves index.html)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cached static assets — Vite outputs hashed filenames so we can
        # serve them with a 1-year immutable cache safely.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # === Backend reverse proxy ===
        # All four locations forward to the same backend container; we
        # keep them as separate location blocks because /ws needs the
        # WebSocket Upgrade headers and /static benefits from a longer
        # client/proxy timeout for video streaming.

        location /api/ {
            # Strip the /api prefix before forwarding so the backend sees
            # /user/me etc., matching the original Spring controller paths.
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /upload {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
        }

        location /static/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
