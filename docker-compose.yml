# Compose for the front-end nginx container.
#
# Production topology:
#   browser  ->  this nginx container  ->  backend container/service
#
# nginx.conf reverse-proxies to the Docker DNS name `to-my-l-app:8081`,
# which is the backend's container_name. The backend container must be
# attached to the shared `to-my-l` Docker network and keep that
# container_name — it's the upstream contract baked into nginx.conf.
#
# Network bootstrap: the backend compose declares the `to-my-l` network
# with an explicit `name: to-my-l` (no compose project prefix), so this
# stack joins it as `external: true`. Bring the backend stack up first;
# this stack will then attach to the network the backend already created.
#
# VITE_* vars are PUBLIC build-time values baked into the SPA bundle.
# Never put DB passwords, SaToken secrets, or other server-side secrets
# here; those belong in the backend deployment only.
#
# VITE_CURRENT_USER_ID / VITE_PARTNER_USER_ID intentionally have NO
# defaults: they decide who the SPA thinks each end is, and silently
# falling back to 1/2 in production would be worse than failing loudly.
# Set them in the shell or .env before `docker compose build`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_WS_BASE: ${VITE_WS_BASE:-}
        VITE_CURRENT_USER_ID: ${VITE_CURRENT_USER_ID:?VITE_CURRENT_USER_ID is required}
        VITE_PARTNER_USER_ID: ${VITE_PARTNER_USER_ID:?VITE_PARTNER_USER_ID is required}
        VITE_CURRENT_USER_NAME: ${VITE_CURRENT_USER_NAME:-}
        VITE_PARTNER_USER_NAME: ${VITE_PARTNER_USER_NAME:-}
        VITE_CURRENT_USERNAMES: ${VITE_CURRENT_USERNAMES:-}
        VITE_PARTNER_USERNAMES: ${VITE_PARTNER_USERNAMES:-}
        VITE_SINCE_DATE: ${VITE_SINCE_DATE:-}
        VITE_PARTNER_BIRTHDAY_MMDD: ${VITE_PARTNER_BIRTHDAY_MMDD:-}
    image: to-my-l-ui:latest
    container_name: to-my-l-ui
    ports:
      # Docker nginx owns 80/443. Stop/disable any host nginx (e.g. 宝塔)
      # that is already bound to these ports before `docker compose up`.
      - '${FRONTEND_HOST_HTTP_PORT:-80}:80'
      - '${FRONTEND_HOST_HTTPS_PORT:-443}:443'
    volumes:
      # Put Tencent Cloud's Nginx cert files here as:
      #   ./certs/fullchain.pem
      #   ./certs/privkey.pem
      # The container reads them from /etc/nginx/certs/*.pem.
      - '${SSL_CERT_DIR:-./certs}:/etc/nginx/certs:ro'
      # Private ritual media. Kept out of git and mounted at runtime so
      # large/private files (song.mp4, hand.jpg, etc.) don't bloat the
      # Docker image and can be replaced without rebuilding.
      - './public/ritual:/usr/share/nginx/html/ritual:ro'
    restart: unless-stopped
    networks:
      - to-my-l

networks:
  to-my-l:
    name: to-my-l
    external: true
